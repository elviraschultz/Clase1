<!DOCTYPE html>
<!--Declaración de uso de ia-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Elvira Schultz</title>
    <style>
        body {
            background-color: #1a1a1a; /* Fondo oscuro */
            color: #e0e0e0;            /* Texto claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #262626;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            border-left: 5px solid #00dbde; /* Detalle de color */
        }
        h1 {
            color: #00dbde;
            margin-top: 0;
            font-size: 2rem;
        }
        h2 {
            font-size: 1rem;
            color: #fc00ff; /* Color vibrante para resaltar */
            background: rgba(252, 0, 255, 0.1);
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .highlight {
            color: #fff;
            border-bottom: 1px solid #00dbde;
        }
        ul {
            padding-left: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Elvira Schultz</h1>
    
    <p>¡Hola! Soy <span class="highlight">Elvi</span>.</p>
    
    <p>Estudiante de <strong>Artes Multimediales</strong> apasionada por las nuevas formas de expresión.</p>
    
    <ul>
        <li>Amo el arte en general.</li>
        <li>Busco nuevas formas de comunicar.</li>
        <li>Creo en el arte como canal de descarga.</li>
    </ul>

    <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">

    <h2>🚀 Nivel de informática: Principiante</h2>
    <p><small>En proceso de aprendizaje...</small></p>
</div>

</body>
</html>
